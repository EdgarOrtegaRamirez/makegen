name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        go-version: ["1.25"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -o makegen .

      - name: Test
        run: go test ./... -v -count=1

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: test -z "$(go fmt ./...)"